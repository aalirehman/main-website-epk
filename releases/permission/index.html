        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --primary-color: #0a0a0a;
                --secondary-color: #1a1a1a;
                --accent-color: #e0e0e0;
                --text-primary: #ffffff;
                --text-secondary: #a0a0a0;
                --text-muted: #666666;
                --border-radius: 12px;
                --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
                --shadow-hover: 0 16px 48px rgba(0, 0, 0, 0.6);
            }

            body {
                font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: #000000;
                color: var(--text-primary);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                overflow-x: hidden;
            }

            .landing {
                width: 100%;
                max-width: 600px;
                padding: 2rem;
                text-align: center;
                animation: fadeIn 1s ease-out;
            }

            .landing__artwork {
                width: 280px;
                height: 280px;
                margin: 0 auto 2.5rem;
                border-radius: var(--border-radius);
                overflow: hidden;
                box-shadow: var(--shadow-hover);
                animation: fadeInUp 1s ease-out 0.2s both;
            }

            .landing__artwork img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: var(--transition);
            }

            .landing__artwork:hover img {
                transform: scale(1.05);
            }

            .landing__artist {
                font-size: 0.9rem;
                color: var(--text-muted);
                font-family: 'JetBrains Mono', monospace;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                margin-bottom: 0.5rem;
                animation: fadeInUp 1s ease-out 0.4s both;
            }

            .landing__title {
                font-size: clamp(2.5rem, 8vw, 4rem);
                font-weight: 700;
                letter-spacing: -0.02em;
                margin-bottom: 0.5rem;
                animation: fadeInUp 1s ease-out 0.5s both;
            }

            .landing__meta {
                font-size: 0.85rem;
                color: var(--text-secondary);
                font-family: 'JetBrains Mono', monospace;
                letter-spacing: 0.05em;
                margin-bottom: 2.5rem;
                animation: fadeInUp 1s ease-out 0.6s both;
            }

            .landing__cta {
                display: inline-flex;
                align-items: center;
                gap: 0.75rem;
                padding: 1rem 2.5rem;
                background: var(--text-primary);
                color: var(--primary-color);
                text-decoration: none;
                border-radius: 50px;
                font-size: 1.1rem;
                font-weight: 600;
                letter-spacing: 0.02em;
                transition: var(--transition);
                box-shadow: 0 4px 24px rgba(255, 255, 255, 0.15);
                animation: fadeInUp 1s ease-out 0.8s both;
            }

            .landing__cta:hover {
                transform: translateY(-3px) scale(1.03);
                box-shadow: 0 8px 40px rgba(255, 255, 255, 0.25);
            }

            .landing__cta:active {
                transform: translateY(0) scale(0.98);
            }

            .landing__cta svg {
                width: 20px;
                height: 20px;
            }

            .landing__links {
                margin-top: 2rem;
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
                animation: fadeInUp 1s ease-out 1s both;
            }

            .landing__link {
                padding: 0.6rem 1.2rem;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 50px;
                color: var(--text-secondary);
                text-decoration: none;
                font-size: 0.85rem;
                font-family: 'JetBrains Mono', monospace;
                transition: var(--transition);
            }

            .landing__link:hover {
                background: rgba(255, 255, 255, 0.1);
                border-color: rgba(255, 255, 255, 0.3);
                color: var(--text-primary);
                transform: translateY(-2px);
            }

            .landing__back {
                margin-top: 3rem;
                animation: fadeInUp 1s ease-out 1.2s both;
            }

            .landing__back a {
                color: var(--text-muted);
                text-decoration: none;
                font-size: 0.8rem;
                font-family: 'JetBrains Mono', monospace;
                letter-spacing: 0.05em;
                transition: var(--transition);
            }

            .landing__back a:hover {
                color: var(--text-secondary);
            }

            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @media (max-width: 480px) {
                .landing {
                    padding: 1.5rem;
                }

                .landing__artwork {
                    width: 220px;
                    height: 220px;
                    margin-bottom: 2rem;
                }

                .landing__cta {
                    padding: 0.85rem 2rem;
                    font-size: 1rem;
                }
            }
        </style>
    </head>
    <body>
        <main class="landing">
            <div class="landing__artwork">
                <img src="https://geo-media.beatport.com/image_size/1400x1400/5ccb80a3-255e-4323-9dbe-07498578cddf.jpg" alt="Permission — Aali Rehman" />
            </div>

            <p class="landing__artist">Aali Rehman</p>
            <h1 class="landing__title">Permission</h1>
            <p class="landing__meta">out now</p>

            <a class="landing__cta" href="https://www.feiyr.com/x/BWEBW" target="_blank" rel="noopener">
                Stream & Download
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 17l9.2-9.2M17 17V7H7"/>
                </svg>
            </a>

            <div class="landing__links">
                <a class="landing__link" href="https://www.beatport.com/release/permission/7028476" target="_blank" rel="noopener">Beatport</a>
                <a class="landing__link" href="https://open.spotify.com/artist/2LD5yBFpwpSO5rz8Cav5Eu" target="_blank" rel="noopener">Spotify</a>
                <a class="landing__link" href="https://music.apple.com/us/artist/aali-rehman/1642126837" target="_blank" rel="noopener">Apple Music</a>
            </div>

            <div class="landing__back">
                <a href="/">&larr; aalirehman.com</a>
            </div>
        </main>
    </body>
</html>
